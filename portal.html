<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portal | Mercadeo Relacional - UAO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .glass { background: rgba(15,23,42,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .code-input { letter-spacing: 0.4em; font-family: 'Inter', monospace; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md">

        <!-- LOGIN -->
        <div id="loginView" class="fade-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                </div>
                <h1 class="text-white text-2xl font-bold">Mi Portal</h1>
                <p class="text-white/40 text-sm mt-1">Mercadeo Relacional y CRM - UAO</p>
            </div>

            <div class="glass p-6">
                <label class="text-white/40 text-xs font-semibold uppercase tracking-wider mb-2 block">Tu email</label>
                <input type="email" id="loginEmail" placeholder="tu@email.com"
                    class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white text-sm focus:outline-none focus:border-indigo-500/50 transition-all mb-4"
                    onkeydown="if(event.key==='Enter')loginPortal()">
                <button onclick="loginPortal()"
                    class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold text-sm hover:opacity-90 transition-opacity">
                    Entrar
                </button>
                <p id="loginError" class="text-red-400/80 text-xs text-center mt-3 hidden">Email no registrado</p>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboardView" class="hidden">
            <!-- Header -->
            <div class="flex items-center justify-between mb-6 fade-in">
                <div>
                    <p class="text-white/40 text-xs">Hola,</p>
                    <h1 class="text-white text-xl font-bold" id="portalNombre">--</h1>
                </div>
                <button onclick="logoutPortal()" class="p-2 rounded-lg hover:bg-white/5 text-white/30 hover:text-white/60 transition-colors" title="Salir">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </button>
            </div>

            <!-- Puntos totales -->
            <div class="glass p-6 mb-4 fade-in" style="animation-delay:0.05s;">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <p class="text-white/40 text-xs font-medium uppercase tracking-wider">Mis Puntos</p>
                        <p class="text-white text-4xl font-black mt-1" id="portalPuntos">0</p>
                    </div>
                    <div class="text-right">
                        <p class="text-white/40 text-xs">Ranking</p>
                        <p class="text-indigo-400 text-2xl font-bold" id="portalRank">#--</p>
                        <p class="text-white/30 text-xs" id="portalTotalEst">de 0</p>
                    </div>
                </div>
                <!-- Progress bar -->
                <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden mb-2">
                    <div class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full transition-all duration-700" id="portalProgress" style="width:0%"></div>
                </div>
                <p class="text-white/30 text-xs text-right" id="portalAsistLabel">0% asistencia</p>
            </div>

            <!-- Desglose -->
            <div class="grid grid-cols-3 gap-3 mb-4 fade-in" style="animation-delay:0.1s;">
                <div class="glass p-4 text-center">
                    <p class="text-emerald-400 text-xl font-bold" id="portalPtsAsist">0</p>
                    <p class="text-white/30 text-[10px] uppercase tracking-wider mt-1">Asistencia</p>
                </div>
                <div class="glass p-4 text-center">
                    <p class="text-cyan-400 text-xl font-bold" id="portalPtsPunt">0</p>
                    <p class="text-white/30 text-[10px] uppercase tracking-wider mt-1">Puntualidad</p>
                </div>
                <div class="glass p-4 text-center">
                    <p class="text-purple-400 text-xl font-bold" id="portalPtsEmail">0</p>
                    <p class="text-white/30 text-[10px] uppercase tracking-wider mt-1">Engagement</p>
                </div>
            </div>

            <!-- Check-in -->
            <div class="glass p-6 mb-4 fade-in" style="animation-delay:0.15s;">
                <h3 class="text-white/80 text-sm font-semibold mb-3">Registrar Asistencia</h3>
                <div class="flex gap-2">
                    <input type="text" id="checkinCode" placeholder="CODIGO" maxlength="6"
                        class="code-input flex-1 px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white text-center text-lg font-bold uppercase focus:outline-none focus:border-emerald-500/50 transition-all"
                        oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')hacerCheckin()">
                    <button onclick="hacerCheckin()" id="checkinBtn"
                        class="px-6 py-3 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-semibold text-sm hover:opacity-90 transition-opacity flex-shrink-0">
                        Asistir
                    </button>
                </div>
                <div id="checkinResult" class="hidden mt-3 px-4 py-3 rounded-xl text-sm"></div>
            </div>

            <!-- Historial -->
            <div class="glass p-6 fade-in" style="animation-delay:0.2s;">
                <h3 class="text-white/80 text-sm font-semibold mb-3">Historial de Clases</h3>
                <div class="space-y-2" id="portalHistorial">
                    <p class="text-white/30 text-sm text-center py-4">Sin historial aun</p>
                </div>
            </div>

            <!-- Footer -->
            <p class="text-white/15 text-[10px] text-center mt-6">UAO - CRM v2.0</p>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6EH-mcYAyXPcw1zLSFlVu4XdJWX-DPJpvIKReESx2pdIGkHkZ05MzdX7PumLuvmLqdg/exec';
        let portalEmail = '';
        let portalData = null;

        // Check stored email
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('crm_portal_email');
            if (saved) {
                document.getElementById('loginEmail').value = saved;
                loginPortal();
            }
        });

        async function loginPortal() {
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            if (!email) return;

            try {
                const res = await fetch(APPS_SCRIPT_URL + '?action=getPortal&email=' + encodeURIComponent(email));
                const json = await res.json();

                if (json.status === 'ok') {
                    portalEmail = email;
                    portalData = json;
                    localStorage.setItem('crm_portal_email', email);
                    document.getElementById('loginView').classList.add('hidden');
                    document.getElementById('dashboardView').classList.remove('hidden');
                    renderDashboard();
                } else {
                    const err = document.getElementById('loginError');
                    err.textContent = json.message || 'Email no registrado';
                    err.classList.remove('hidden');
                    setTimeout(() => err.classList.add('hidden'), 3000);
                }
            } catch (e) {
                const err = document.getElementById('loginError');
                err.textContent = 'Error de conexion';
                err.classList.remove('hidden');
            }
        }

        function logoutPortal() {
            localStorage.removeItem('crm_portal_email');
            portalEmail = '';
            portalData = null;
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('loginView').classList.remove('hidden');
            document.getElementById('loginEmail').value = '';
        }

        function renderDashboard() {
            if (!portalData) return;
            const est = portalData.estudiante;
            const pts = portalData.puntos;

            document.getElementById('portalNombre').textContent = est.nombre || 'Estudiante';
            document.getElementById('portalPuntos').textContent = pts.totalPuntos;
            document.getElementById('portalRank').textContent = portalData.rank > 0 ? '#' + portalData.rank : '--';
            document.getElementById('portalTotalEst').textContent = 'de ' + portalData.totalEstudiantes;

            document.getElementById('portalPtsAsist').textContent = pts.puntosAsistencia;
            document.getElementById('portalPtsPunt').textContent = pts.puntosPuntualidad;
            document.getElementById('portalPtsEmail').textContent = pts.puntosEmail;

            const pctNum = parseInt(pts.porcentajeAsistencia) || 0;
            document.getElementById('portalProgress').style.width = pctNum + '%';
            document.getElementById('portalAsistLabel').textContent = pts.porcentajeAsistencia + ' asistencia (' + pts.clasesAsistidas + ' clases)';

            // Historial
            const histContainer = document.getElementById('portalHistorial');
            const clases = portalData.clases || [];
            const asistencias = portalData.asistencias || [];

            if (clases.length === 0) {
                histContainer.innerHTML = '<p class="text-white/30 text-sm text-center py-4">Sin historial aun</p>';
                return;
            }

            histContainer.innerHTML = clases.map(c => {
                const asist = asistencias.find(a => a.claseId === c.claseId);
                const fecha = c.fecha ? new Date(c.fecha).toLocaleDateString('es-CO', { day: 'numeric', month: 'short' }) : '--';

                if (asist) {
                    const mins = asist.minutosAntes;
                    const puntualLabel = mins > 0 ? `${mins} min temprano` : mins < 0 ? `${Math.abs(mins)} min tarde` : 'A tiempo';
                    const puntualColor = mins > 0 ? 'text-emerald-400' : mins < 0 ? 'text-amber-400' : 'text-white/50';
                    return `
                    <div class="flex items-center justify-between bg-white/3 rounded-xl p-3">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-emerald-500/15 flex items-center justify-center">
                                <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                            </div>
                            <div>
                                <p class="text-white text-sm font-medium">Clase ${c.numero}: ${c.titulo}</p>
                                <p class="${puntualColor} text-xs">${fecha} · ${puntualLabel}</p>
                            </div>
                        </div>
                        <span class="text-indigo-300 text-sm font-bold">${asist.puntosPuntualidad} pts</span>
                    </div>`;
                } else {
                    return `
                    <div class="flex items-center justify-between bg-white/3 rounded-xl p-3 opacity-50">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-lg bg-red-500/15 flex items-center justify-center">
                                <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </div>
                            <div>
                                <p class="text-white text-sm font-medium">Clase ${c.numero}: ${c.titulo}</p>
                                <p class="text-red-400/60 text-xs">${fecha} · Ausente</p>
                            </div>
                        </div>
                        <span class="text-white/20 text-sm">0 pts</span>
                    </div>`;
                }
            }).join('');
        }

        async function hacerCheckin() {
            const code = document.getElementById('checkinCode').value.trim();
            if (!code || code.length < 4) {
                showCheckinResult('Ingresa el codigo de asistencia', false);
                return;
            }

            const btn = document.getElementById('checkinBtn');
            btn.disabled = true;
            btn.style.opacity = '0.5';
            btn.textContent = '...';

            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({
                        action: 'checkin',
                        email: portalEmail,
                        codigo: code
                    })
                });
                const json = await res.json();

                if (json.status === 'ok') {
                    let msg = `Asistencia registrada! +${json.puntos} puntos`;
                    if (json.puntosPuntualidad > 0) {
                        msg += ` (${json.puntosBase} base + ${json.puntosPuntualidad} puntualidad)`;
                    }
                    showCheckinResult(msg, true);
                    document.getElementById('checkinCode').value = '';
                    // Reload data
                    setTimeout(() => loginPortal(), 1500);
                } else {
                    showCheckinResult(json.message || 'Error', false);
                }
            } catch (e) {
                showCheckinResult('Error de conexion', false);
            }

            btn.disabled = false;
            btn.style.opacity = '1';
            btn.textContent = 'Asistir';
        }

        function showCheckinResult(msg, success) {
            const el = document.getElementById('checkinResult');
            el.classList.remove('hidden');
            el.textContent = msg;
            if (success) {
                el.style.background = 'rgba(16,185,129,0.1)';
                el.style.border = '1px solid rgba(16,185,129,0.2)';
                el.style.color = '#6ee7b7';
            } else {
                el.style.background = 'rgba(239,68,68,0.1)';
                el.style.border = '1px solid rgba(239,68,68,0.2)';
                el.style.color = '#fca5a5';
            }
            setTimeout(() => el.classList.add('hidden'), 5000);
        }
    </script>
</body>
</html>
